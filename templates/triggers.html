{% extends 'base.html' %}

{% block title %}
Records
{% endblock title %}

{% block body %}

<div class="container mt-5">

    <h1 class="text-center mb-4">Database Records</h1>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Message</th>
            </tr>
        </thead>

        <tbody>

            {% for row in query %}

            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.message }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock body %}
